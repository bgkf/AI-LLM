<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Expeditions — Deep Sea Database</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --void: #020810;
      --abyss: #040f1e;
      --deep: #071628;
      --mid: #0a1f38;
      --surface: #0d2645;
      --glow-blue: #00aaff;
      --glow-cyan: #00ffee;
      --glow-amber: #ffb347;
      --bio-gold: #ffd166;
      --text-primary: #c8e6f7;
      --text-secondary: #6a9ab8;
      --text-dim: #2e5470;
      --border: rgba(0, 170, 255, 0.12);
      --border-bright: rgba(0, 170, 255, 0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--void);
      color: var(--text-primary);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 17px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 80%, rgba(0,80,160,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 20%, rgba(0,40,100,0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .particles {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .particle {
      position: absolute; border-radius: 50%;
      background: var(--glow-cyan); opacity: 0;
      animation: drift linear infinite;
    }
    @keyframes drift {
      0%   { opacity: 0; transform: translateY(100vh); }
      10%  { opacity: 0.5; }
      90%  { opacity: 0.2; }
      100% { opacity: 0; transform: translateY(-10vh) translateX(20px); }
    }

    .container {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto;
      padding: 0 2rem 4rem;
    }

    /* nav */
    nav {
      display: flex;
      gap: 1.5rem;
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }
    nav a {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--glow-cyan); }
    nav a.active { color: var(--glow-blue); }

    header {
      text-align: center;
      padding: 3.5rem 0 2.5rem;
      position: relative;
    }
    header::after {
      content: '';
      display: block;
      width: 200px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--glow-amber), transparent);
      margin: 2rem auto 0;
    }
    .header-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      color: var(--glow-amber);
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: 0.8;
    }
    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.05em;
      text-shadow: 0 0 60px rgba(255,179,71,0.3);
    }
    .header-sub {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-top: 0.75rem;
      font-style: italic;
      font-weight: 300;
    }

    /* stats row */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1px;
      margin-bottom: 3rem;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .stat-card {
      background: var(--abyss);
      padding: 1.25rem;
      text-align: center;
      transition: background 0.3s;
    }
    .stat-card:hover { background: var(--deep); }
    .stat-value {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--glow-amber);
      text-shadow: 0 0 30px rgba(255,179,71,0.4);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-top: 0.4rem;
    }

    /* timeline */
    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 2rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .timeline {
      position: relative;
      margin-bottom: 4rem;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 140px;
      top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent, var(--border-bright), var(--border-bright), transparent);
    }

    .timeline-item {
      display: flex;
      gap: 0;
      margin-bottom: 0;
      cursor: pointer;
      position: relative;
    }
    .timeline-year {
      width: 140px;
      flex-shrink: 0;
      text-align: right;
      padding-right: 2rem;
      padding-top: 1.4rem;
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      transition: color 0.2s;
    }
    .timeline-dot {
      position: absolute;
      left: 134px;
      top: 1.6rem;
      width: 13px; height: 13px;
      border-radius: 50%;
      border: 2px solid var(--glow-amber);
      background: var(--void);
      transition: all 0.2s;
      z-index: 1;
      flex-shrink: 0;
    }
    .timeline-item:hover .timeline-dot,
    .timeline-item.active .timeline-dot {
      background: var(--glow-amber);
      box-shadow: 0 0 12px rgba(255,179,71,0.6);
    }
    .timeline-item:hover .timeline-year,
    .timeline-item.active .timeline-year {
      color: var(--glow-amber);
    }

    .timeline-card {
      flex: 1;
      margin-left: 2rem;
      background: var(--abyss);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }
    .timeline-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--glow-amber);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .timeline-item:hover .timeline-card,
    .timeline-item.active .timeline-card {
      border-color: rgba(255,179,71,0.3);
      background: var(--deep);
    }
    .timeline-item:hover .timeline-card::before,
    .timeline-item.active .timeline-card::before {
      opacity: 1;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 0.6rem;
    }
    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      color: var(--text-primary);
    }
    .card-vessel {
      font-size: 0.8rem;
      color: var(--glow-amber);
      font-style: italic;
      white-space: nowrap;
    }
    .card-meta {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    .meta-pill {
      font-size: 0.75rem;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
    }
    .meta-pill span {
      color: var(--text-dim);
      margin-right: 0.3rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .card-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-style: italic;
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 0.75rem;
    }
    .card-creatures {
      display: none;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .timeline-item.active .card-creatures { display: block; }
    .creatures-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.75rem;
    }
    .creature-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .creature-chip {
      background: rgba(0,170,255,0.08);
      border: 1px solid var(--border-bright);
      color: var(--text-secondary);
      padding: 0.3rem 0.75rem;
      font-size: 0.8rem;
      border-radius: 1px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .creature-chip:hover {
      border-color: var(--glow-cyan);
      color: var(--glow-cyan);
      background: rgba(0,255,238,0.08);
    }
    .bio-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--bio-gold);
      flex-shrink: 0;
    }
    .depth-badge {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      color: var(--glow-blue);
      white-space: nowrap;
    }

    /* detail panel */
    .detail-panel {
      background: var(--abyss);
      border: 1px solid rgba(255,179,71,0.3);
      border-radius: 2px;
      padding: 2rem 2.5rem;
      margin-bottom: 3rem;
      display: none;
      animation: fadeIn 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .detail-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--glow-amber), transparent);
    }
    .detail-panel.visible { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.5rem;
    }
    .panel-name {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      color: var(--text-primary);
    }
    .panel-vessel {
      font-style: italic;
      color: var(--glow-amber);
      font-size: 1rem;
      margin-top: 0.25rem;
      font-weight: 300;
    }
    .panel-close {
      background: transparent;
      border: 1px solid var(--border-bright);
      color: var(--text-secondary);
      width: 2rem; height: 2rem;
      cursor: pointer; font-size: 1rem;
      flex-shrink: 0; transition: all 0.2s;
      border-radius: 1px;
    }
    .panel-close:hover { border-color: var(--glow-amber); color: var(--glow-amber); }
    .panel-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1.5rem;
      padding: 1.5rem;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .pmeta-key {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.3rem;
    }
    .pmeta-val {
      font-family: 'Cinzel', serif;
      font-size: 0.95rem;
      color: var(--glow-amber);
    }
    .panel-desc {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text-secondary);
      font-style: italic;
      font-weight: 300;
      border-left: 2px solid rgba(255,179,71,0.3);
      padding-left: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .panel-creatures-title {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 1rem;
    }
    .panel-creature-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.75rem;
    }
    .panel-creature-card {
      background: var(--deep);
      border: 1px solid var(--border);
      padding: 0.9rem 1.1rem;
      border-radius: 1px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      display: block;
    }
    .panel-creature-card:hover {
      border-color: var(--glow-cyan);
      background: rgba(0,170,255,0.06);
    }
    .pcc-name {
      font-size: 0.95rem;
      color: var(--text-primary);
      margin-bottom: 0.2rem;
    }
    .pcc-sci {
      font-style: italic;
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 300;
      margin-bottom: 0.4rem;
    }
    .pcc-meta {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .pcc-depth {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      color: var(--glow-blue);
    }

    .loading { text-align: center; padding: 4rem; color: var(--text-dim); font-style: italic; }
    .error { text-align: center; padding: 4rem; color: #ff6b6b; font-style: italic; }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">
  <nav>
    <a href="index.html">Creature Database</a>
    <a href="expeditions.html" class="active">Research Expeditions</a>
    <a href="collections.html">Collections</a>
  </nav>

  <header>
    <div class="header-eyebrow">Hadal Research Institute · Field Database</div>
    <h1>Research Expeditions</h1>
    <p class="header-sub">The voyages that mapped life in the deep</p>
  </header>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-value" id="statExp">—</div><div class="stat-label">Expeditions</div></div>
    <div class="stat-card"><div class="stat-value" id="statCreatures">—</div><div class="stat-label">Species Discovered</div></div>
    <div class="stat-card"><div class="stat-value" id="statSpan">—</div><div class="stat-label">Years of Research</div></div>
    <div class="stat-card"><div class="stat-value" id="statDepth">—</div><div class="stat-label">Deepest Record (m)</div></div>
  </div>

  <!-- detail panel (populated on expand) -->
  <div class="detail-panel" id="detailPanel">
    <div class="panel-header">
      <div>
        <div class="panel-name" id="pName"></div>
        <div class="panel-vessel" id="pVessel"></div>
      </div>
      <button class="panel-close" id="panelClose">✕</button>
    </div>
    <div class="panel-meta" id="pMeta"></div>
    <p class="panel-desc" id="pDesc"></p>
    <div class="panel-creatures-title">Creatures Discovered</div>
    <div class="panel-creature-list" id="pCreatures"></div>
  </div>

  <div class="section-title">Expedition Timeline</div>
  <div class="timeline" id="timeline">
    <div class="loading">Loading expeditions…</div>
  </div>
</div>

<script>
  const API = 'http://localhost:8000';
  let expeditions = [];
  let allCreatures = [];
  let activeId = null;

  // particles
  const pc = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random() * 2.5 + 0.5;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*20+15}s;animation-delay:${Math.random()*20}s;`;
    pc.appendChild(p);
  }

  async function init() {
    try {
      const [expRes, cRes, stRes] = await Promise.all([
        fetch(`${API}/expeditions`),
        fetch(`${API}/creatures`),
        fetch(`${API}/stats`)
      ]);
      expeditions = await expRes.json();
      allCreatures = await cRes.json();
      const stats = await stRes.json();

      renderStats(stats);
      renderTimeline();
    } catch(e) {
      document.getElementById('timeline').innerHTML =
        `<div class="error">Could not connect to API at ${API} — is the FastAPI server running?</div>`;
    }
  }

  function renderStats(stats) {
    document.getElementById('statExp').textContent = stats.total_expeditions;
    document.getElementById('statCreatures').textContent = stats.total;
    const years = expeditions.map(e => e.years.split('–'));
    const minYear = Math.min(...years.map(y => parseInt(y[0])));
    const maxYear = Math.max(...years.map(y => parseInt(y[1] || y[0])));
    document.getElementById('statSpan').textContent = (maxYear - minYear);
    const maxDepth = Math.max(...expeditions.map(e => e.depth_record_m));
    document.getElementById('statDepth').textContent = maxDepth.toLocaleString();
  }

  function renderTimeline() {
    const sorted = [...expeditions].sort((a, b) => {
      return parseInt(a.years.split('–')[0]) - parseInt(b.years.split('–')[0]);
    });

    document.getElementById('timeline').innerHTML = sorted.map(exp => {
      const creatures = allCreatures.filter(c => c.expedition_id === exp.id);
      return `
        <div class="timeline-item" data-id="${exp.id}">
          <div class="timeline-year">${exp.years}</div>
          <div class="timeline-dot"></div>
          <div class="timeline-card">
            <div class="card-header">
              <div class="card-name">${exp.name}</div>
              <div class="card-vessel">${exp.vessel}</div>
            </div>
            <div class="card-meta">
              <div class="meta-pill"><span>Institution</span>${exp.institution}</div>
              <div class="meta-pill"><span>Region</span>${exp.region}</div>
              <div class="meta-pill"><span>Scientist</span>${exp.lead_scientist}</div>
              <div class="meta-pill"><span>Max Depth</span>${exp.depth_record_m.toLocaleString()} m</div>
            </div>
            <div class="card-desc">${exp.description}</div>
            <div class="card-creatures">
              <div class="creatures-label">Creatures Discovered (${creatures.length})</div>
              <div class="creature-chips">
                ${creatures.map(c => `
                  <span class="creature-chip" onclick="openDetail(${exp.id})">
                    ${c.bioluminescent ? '<span class="bio-dot"></span>' : ''}
                    ${c.name}
                  </span>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');

    document.querySelectorAll('.timeline-item').forEach(item => {
      item.addEventListener('click', (e) => {
        if (e.target.closest('.creature-chip')) return;
        const id = parseInt(item.dataset.id);
        toggleItem(id, item);
      });
    });
  }

  function toggleItem(id, itemEl) {
    const wasActive = activeId === id;
    document.querySelectorAll('.timeline-item').forEach(el => el.classList.remove('active'));
    if (wasActive) {
      activeId = null;
    } else {
      activeId = id;
      itemEl.classList.add('active');
    }
  }

  async function openDetail(expeditionId) {
    // API chain: fetch expedition with creatures joined in
    const res = await fetch(`${API}/expeditions/${expeditionId}`);
    const data = await res.json();

    document.getElementById('pName').textContent = data.name;
    document.getElementById('pVessel').textContent = data.vessel;
    document.getElementById('pDesc').textContent = data.description;

    document.getElementById('pMeta').innerHTML = [
      ['Institution', data.institution],
      ['Region', data.region],
      ['Years', data.years],
      ['Lead Scientist', data.lead_scientist],
      ['Max Depth', data.depth_record_m.toLocaleString() + ' m'],
      ['Creatures Found', data.creatures.length],
    ].map(([k, v]) => `
      <div><div class="pmeta-key">${k}</div><div class="pmeta-val">${v}</div></div>
    `).join('');

    // for each creature in the expedition, chain to /creatures/{id} to get full detail
    const creatureDetails = await Promise.all(
      data.creatures.map(c => fetch(`${API}/creatures/${c.id}`).then(r => r.json()))
    );

    document.getElementById('pCreatures').innerHTML = creatureDetails.map(c => `
      <div class="panel-creature-card" onclick="goToCreature(${c.id})">
        <div class="pcc-name">${c.name}</div>
        <div class="pcc-sci">${c.scientific_name}</div>
        <div class="pcc-meta">
          <span class="pcc-depth">${c.depth_min.toLocaleString()}–${c.depth_max.toLocaleString()} m</span>
          ${c.bioluminescent ? '<span class="bio-dot"></span>' : ''}
        </div>
      </div>
    `).join('');

    const panel = document.getElementById('detailPanel');
    panel.classList.add('visible');
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function goToCreature(id) {
    // navigate to creature dashboard with creature highlighted
    window.location.href = `index.html#creature-${id}`;
  }

  document.getElementById('panelClose').addEventListener('click', () => {
    document.getElementById('detailPanel').classList.remove('visible');
  });

  init();
</script>
</body>
</html>
