<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Okta Intelligence</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <!-- ===================================================
       HEADER
       =================================================== -->
  <header class="header">
    <div class="header-logo">
      Okta Intelligence
    </div>

    <div class="header-right">
      <div class="health-indicators">
        <div class="indicator grey" id="ind-server">
          <div class="indicator-dot"></div>
          <span>Server</span>
          <div class="indicator-tooltip" id="tooltip-server">Checking…</div>
        </div>
        <div class="indicator grey" id="ind-api">
          <div class="indicator-dot"></div>
          <span>API</span>
          <div class="indicator-tooltip" id="tooltip-api">Checking…</div>
        </div>
      </div>

      <div class="header-actions">
        <button class="btn btn-token state-unset" id="btn-token">Set Token</button>
        <button class="btn" id="btn-restart">Restart</button>
        <button class="btn btn-danger" id="btn-quit">Quit</button>
      </div>
    </div>
  </header>

  <!-- ===================================================
       MAIN CONTENT
       =================================================== -->
  <main class="main-content">

    <!-- Query panel -->
    <div class="panel" id="query-panel">
      <div class="query-row">
        <input
          class="query-input"
          id="query-input"
          type="text"
          placeholder="Ask anything about your Okta environment…"
          autocomplete="off"
          spellcheck="false"
        />
        <select class="select-limit" id="select-limit">
          <option value="50" selected>50 results</option>
          <option value="100">100 results</option>
          <option value="200">200 results</option>
          <option value="500">500 results</option>
        </select>
        <button class="btn-run" id="btn-run">Run</button>
      </div>

      <div class="controls-row">
        <span class="ctrl-label">Range</span>
        <button class="btn-time active" data-range="24h">24h</button>
        <button class="btn-time" data-range="7d">7d</button>
        <button class="btn-time" data-range="30d">30d</button>
        <button class="btn-time" data-range="custom">Custom</button>
      </div>

      <div class="templates-row">
        <span class="ctrl-label">Templates</span>
        <button class="chip" data-prompt="List all users with status ACTIVE">All active users</button>
        <button class="chip" data-prompt="List all admin roles">List all admin users</button>
        <button class="chip" data-prompt="List users deprovisioned in the last 30 days">Deprovisioned this month</button>
        <button class="chip" data-prompt="Get all failed login events from the last 24 hours">Failed logins today</button>
        <button class="chip" data-prompt="Search for MFA challenge failures in the last 7 days">Suspicious MFA events</button>
        <button class="chip" data-prompt="List all active app assignments">App access report</button>
        <button class="chip" data-prompt="List all devices with status ACTIVE">All active devices</button>
      </div>
    </div>

    <!-- Clarify panel (hidden until needed) -->
    <div id="clarify-panel">
      <div class="clarify-question" id="clarify-question"></div>
      <input
        class="clarify-input"
        id="clarify-input"
        type="text"
        placeholder="Your answer…"
        autocomplete="off"
      />
      <button class="btn-clarify-submit" id="btn-clarify-submit">Submit</button>
    </div>

    <!-- Result panel (hidden until results arrive) -->
    <div class="panel" id="result-panel">
      <div class="result-panel-header">
        <div class="result-meta">
          <span class="badge-tool" id="result-tool-badge">—</span>
          <span class="result-count" id="result-count"></span>
        </div>
        <div class="result-actions">
          <button class="btn-action" id="btn-export-json">↓ JSON</button>
          <button class="btn-action" id="btn-export-csv">↓ CSV</button>
          <button class="btn-action workflow" id="btn-workflow">→ Workflow</button>
        </div>
      </div>

      <div class="table-wrap">
        <div id="result-content">
          <div class="state-placeholder">No results yet.</div>
        </div>
      </div>
    </div>

  </main>

</div>

<!-- ===================================================
     SET TOKEN MODAL
     =================================================== -->
<div class="modal-overlay" id="modal-token">
  <div class="modal">
    <div class="modal-title">Set Okta API token</div>
    <div class="modal-field">
      <div class="modal-label">API Token</div>
      <input
        class="modal-input"
        id="token-input"
        type="text"
        placeholder="00…"
        autocomplete="off"
        autocapitalize="off"
  		spellcheck="false"
        data-lpignore="true"
        data-1p-ignore="true"
      />
      <div class="modal-hint">Saved for this session only — never written to disk.</div>
    </div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" id="btn-token-cancel">Cancel</button>
      <button class="btn-modal-primary" id="btn-token-save">Save for session</button>
    </div>
  </div>
</div>

<!-- ===================================================
     WORKFLOW MODAL
     =================================================== -->
<div class="modal-overlay" id="modal-workflow">
  <div class="modal">
    <div class="modal-title">Send to Okta Workflow</div>
    <div class="modal-field">
      <div class="modal-label">Invoke URL</div>
      <input
        class="modal-input"
        id="workflow-url-input"
        type="text"
        placeholder="https://subdomain.workflows.okta.com/api/flo/…"
        autocomplete="off"
        spellcheck="false"
      />
    </div>
    <div class="modal-field">
      <div class="modal-label">Data to send</div>
      <div class="radio-group">
        <label class="radio-option">
          <input type="radio" name="wf-scope" value="all" checked />
          Full result set
          <span class="muted" id="wf-all-count">(0 records)</span>
        </label>
        <label class="radio-option" id="wf-selected-label">
          <input type="radio" name="wf-scope" value="selected" id="wf-radio-selected" />
          Selected rows only
          <span class="muted" id="wf-selected-count">(0 selected)</span>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <span class="modal-status" id="workflow-status"></span>
      <button class="btn-modal-cancel" id="btn-workflow-cancel">Cancel</button>
      <button class="btn-modal-primary" id="btn-workflow-send" disabled>Send</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
